 ATDM_news_events.1.t: "Nazi Georgia Annexes Abkhazia with Deme's Support"
 ATDM_news_events.1.d: "Tbilisi, Georgia – In a significant diplomatic breakthrough, the Georgian government has announced plans for the peaceful annexation of Abkhazia, bolstered by support from the Deme, a prominent regional advocacy group. Prime Minister Irakli Garibashvili revealed the initiative during a press conference, emphasizing a commitment to dialogue and cooperation with the Abkhaz people.\n\nThe plan includes a proposed referendum allowing Abkhaz residents to express their views on reintegration into Georgia. Deme has pledged to facilitate discussions and promote cultural exchanges, aiming to ease tensions and foster goodwill between communities."
 ATDM_news_events.1.a: "Man deme must be stopped man"